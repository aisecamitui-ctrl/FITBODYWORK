<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grade Checker App</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0000ff">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 300px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: blue;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.result {
    margin-top: 15px;
    padding: 10px;
    background: #eee;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Grade Checker</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="prof" placeholder="Enter Professor Name">
    <input type="number" id="grade" placeholder="Enter P1 Grade">

    <button onclick="checkGrade()">Check</button>

    <div class="result" id="output"></div>
</div>

<script>
// Grade Checker Function
function checkGrade() {
    let name = document.getElementById("name").value;
    let prof = document.getElementById("prof").value;
    let grade = document.getElementById("grade").value;

    let status = "";

    if (grade >= 80) {
        status = "Passed";
    } else {
        status = "Failed";
    }

    document.getElementById("output").innerHTML =
        "<strong>Name:</strong> " + name + "<br>" +
        "<strong>Professor:</strong> " + prof + "<br>" +
        "<strong>Status:</strong> " + status;
}

// Register Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("Service Worker Failed:", err));
}
</script>

</body>
</html>
