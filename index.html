<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitBody Work</title>

<!-- Manifest for PWA -->
<link rel="manifest" href="manifest.json">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-color: #f0f0f0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.header {
    text-align: center;
    margin-bottom: 50px;
}

.title-box {
    border: 2px solid #5a88b8; 
    padding: 20px 40px;         
    border-radius: 10px;        
    background-color: #ffffff;  
    display: inline-block;     
}

.main-title {
    font-size: 40px;
    color: #333;
    font-weight: bold;
}

.exercise-card {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 600px;
}

.exercise-img {
    width: 200px;
    height: 200px;
    min-width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    overflow: hidden;
    background-color: #cce5ff;
}

.exercise-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.exercise-info {
    display: flex;
    flex-direction: column;
}

.exercise-info h2 {
    font-size: 28px;
    margin-bottom: 15px;
    text-transform: uppercase;
}

.btn {
    width: 150px;
    padding: 10px 0;
    border: 2px solid #000;
    border-radius: 20px;
    background-color: #fff;
    font-size: 16px;
    cursor: pointer;
    text-align: center;
}

.btn:hover {
    background-color: #f8f8f8;
}

.message {
    margin-top: 15px;
    font-size: 16px;
    color: #333;
}
</style>
</head>

<body>

<div class="header">
    <div class="title-box">
        <h1 class="main-title">FITBODY WORK</h1>
    </div>
</div>

<!-- Goblet Squat -->
<div class="exercise-card">
    <div class="exercise-img">
        <img src="goblet-squat.jpg" alt="Goblet Squat">
    </div>
    <div class="exercise-info">
        <h2>GOBLET SQUAT</h2>
        <button class="btn" onclick="showGoblet()">CLICK</button>
        <p id="gobletMessage" class="message"></p>
    </div>
</div>

<!-- Sit-Up -->
<div class="exercise-card">
    <div class="exercise-img">
        <img src="situp.jpg" alt="Sit-Up">
    </div>
    <div class="exercise-info">
        <h2>SIT-UP</h2>
        <button class="btn" onclick="showSitup()">CLICK</button>
        <p id="situpMessage" class="message"></p>
    </div>
</div>

<!-- Pushup -->
<div class="exercise-card">
    <div class="exercise-img">
        <img src="pushup.jpg" alt="Pushup">
    </div>
    <div class="exercise-info">
        <h2>PUSHUP</h2>
        <button class="btn" onclick="showPushup()">CLICK</button>
        <p id="pushupMessage" class="message"></p>
    </div>
</div>

<script>
// Toggle message content
function toggleMessage(id, content) {
    const element = document.getElementById(id);
    element.innerHTML = element.innerHTML === "" ? content : "";
}

// Show exercise info
function showGoblet() {
    const content = `
        <strong>The goblet squat improves your squat mechanics, builds lower-body endurance, and adds muscle.</strong><br><br>
        <strong>SETS & REPS:</strong> 3 SETS, 12-15 REPS<br><br>
        <strong>BENEFITS:</strong><br>
        Improves Squat Mechanics<br>
        Builds Leg Strength<br>
        Enhances Core Stability<br>
        Increases Mobility
    `;
    toggleMessage("gobletMessage", content);
}

function showSitup() {
    const content = `
        <strong>Situps target your abs by lifting your torso from lying position.</strong><br><br>
        <strong>SETS & REPS:</strong> 2-3 SETS, 5-8 REPS<br><br>
        <strong>BENEFITS:</strong><br>
        Pectoralis major<br>
        Abdominus rectus<br>
        Serratus<br>
        Latissimus dorsi<br>
        External oblique
    `;
    toggleMessage("situpMessage", content);
}

function showPushup() {
    const content = `
        <strong>Push-ups are fast and effective for building upper body strength.</strong><br><br>
        <strong>SETS & REPS:</strong> 2-3 SETS, 3-5 REPS<br><br>
        <strong>BENEFITS:</strong><br>
        Upper pectoralis major<br>
        Anterior deltoid<br>
        Lower pectoralis major<br>
        Biceps brachii, short head<br>
        Triceps brachii
    `;
    toggleMessage("pushupMessage", content);
}

// Service Worker registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service.js')
            .then(reg => console.log('Service Worker registered!', reg))
            .catch(err => console.log('Service Worker registration failed:', err));
    });
}
</script>

</body>
</html>
